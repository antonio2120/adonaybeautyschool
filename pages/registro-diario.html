<div class="animate-fadeInUp">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="font-serif text-4xl font-bold text-primary-900 mb-2">Registro de Prácticas</h1>
    <div class="h-1 w-12 bg-secondary-400 my-3"></div>
    <p class="text-gray-700">Administra y registra las prácticas realizadas por los estudiantes</p>
  </div>

  <!-- Tabs Navigation -->
  <div class="bg-white rounded-lg shadow mb-8 border border-gray-200">
    <div class="flex border-b border-gray-200">
      <button class="tab-btn flex-1 px-6 py-4 text-center font-semibold text-gray-700 hover:text-primary-900 border-b-2 border-transparent transition-colors active" data-tab="registro">
        <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Registrar Práctica
      </button>
      <button class="tab-btn flex-1 px-6 py-4 text-center font-semibold text-gray-700 hover:text-primary-900 border-b-2 border-transparent transition-colors" data-tab="practicas">
        <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
        Prácticas Registradas
      </button>
      <button class="tab-btn flex-1 px-6 py-4 text-center font-semibold text-gray-700 hover:text-primary-900 border-b-2 border-transparent transition-colors" data-tab="detalle">
        <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        Detalle por Estudiante
      </button>
    </div>
  </div>

  <!-- Tab 1: Registro de Práctica -->
  <div id="tab-registro" class="tab-content max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8 border border-gray-200">
      <form id="registro-form">
        <!-- Estudiante -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Estudiante <span class="text-red-500">*</span></label>
          <input
            type="text"
            id="estudiante-search"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100"
            placeholder="Busca por nombre o ID..."
            autocomplete="off"
          >
          <div id="estudiante-sugerencias" class="mt-2 border border-gray-200 rounded-lg max-h-48 overflow-y-auto hidden bg-white"></div>
          <input type="hidden" id="estudiante-id" />
        </div>

        <!-- Estudiante Seleccionado -->
        <div id="estudiante-seleccionado" class="mb-6 p-4 bg-secondary-50 rounded-lg hidden border border-secondary-200">
          <div class="flex items-center justify-between">
            <div>
              <p id="estudiante-nombre" class="font-bold text-gray-900"></p>
              <p id="estudiante-programa" class="text-sm text-gray-600"></p>
            </div>
            <button type="button" onclick="document.getElementById('estudiante-seleccionado').classList.add('hidden'); document.getElementById('estudiante-search').value = ''; document.getElementById('estudiante-id').value = '';" class="text-red-600 hover:text-red-700 font-semibold">✕</button>
          </div>
        </div>

        <!-- Tipo de Práctica -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Tipo de Práctica <span class="text-red-500">*</span></label>
          <select id="tipo-practica" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100">
            <option value="">-- Selecciona un tipo --</option>
            <optgroup label="Corte de Cabello">
              <option value="CUT001">Corte Recto 0°</option>
              <option value="CUT004">Corte Escalonado Bob Corto 45°</option>
              <option value="CUT007">Permanente Espiral</option>
            </optgroup>
            <optgroup label="Peluquería">
              <option value="STYLE001">Planchado</option>
              <option value="STYLE002">Ondulación Térmica</option>
            </optgroup>
            <optgroup label="Textura Química">
              <option value="CHEM002">Permanente Básico</option>
              <option value="CHEM010">Coloración Permanente</option>
            </optgroup>
          </select>
        </div>

        <!-- Horas -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Horas Dedicadas <span class="text-red-500">*</span></label>
            <input
              type="number"
              id="horas"
              step="0.5"
              min="0.5"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100"
              placeholder="Ej: 2.5"
            >
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Tipo de Modelo <span class="text-red-500">*</span></label>
            <select id="tipo-modelo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100">
              <option value="">-- Selecciona --</option>
              <option value="Persona">Persona</option>
              <option value="Mannequin">Mannequin</option>
            </select>
          </div>
        </div>

        <!-- Fecha -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha <span class="text-red-500">*</span></label>
          <input
            type="date"
            id="fecha-practica"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100"
          >
        </div>

        <!-- Instructor -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Instructor</label>
          <input
            type="text"
            id="instructor"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100"
            placeholder="Nombre del instructor"
          >
        </div>

        <!-- Notas -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Notas (Opcional)</label>
          <textarea
            id="notas"
            rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400 focus:ring-2 focus:ring-secondary-100"
            placeholder="Observaciones sobre la práctica..."
          ></textarea>
        </div>

        <!-- Autorización -->
        <div class="mb-8">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="autorizada" class="w-4 h-4 text-secondary-500 rounded">
            <span class="text-sm font-semibold text-gray-700">Autorizado por Instructora</span>
          </label>
        </div>

        <button
          type="submit"
          class="w-full px-6 py-3 bg-secondary-500 hover:bg-secondary-600 text-white rounded-lg font-semibold transition-all flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          Guardar Práctica
        </button>
      </form>
    </div>
  </div>

  <!-- Tab 2: Prácticas Registradas -->
  <div id="tab-practicas" class="tab-content hidden">
    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Estudiante</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Práctica</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Fecha</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Horas</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Modelo</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Autorizada</th>
            </tr>
          </thead>
          <tbody id="tabla-practicas">
            <tr class="border-b border-gray-200 hover:bg-gray-50">
              <td class="px-6 py-4 text-sm text-gray-700">María García López</td>
              <td class="px-6 py-4 text-sm text-gray-700">Permanente Espiral</td>
              <td class="px-6 py-4 text-sm text-gray-700">15/07/2024</td>
              <td class="px-6 py-4 text-sm text-gray-700">4 h</td>
              <td class="px-6 py-4 text-sm text-gray-700">Persona</td>
              <td class="px-6 py-4"><span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-semibold rounded">✓</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab 3: Detalle por Estudiante -->
  <div id="tab-detalle" class="tab-content hidden">
    <div class="bg-white rounded-lg shadow p-6 mb-6 border border-gray-200">
      <label class="block text-sm font-medium text-gray-700 mb-2">Selecciona un Estudiante</label>
      <select id="filtro-estudiante" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-secondary-400">
        <option value="">-- Todos los estudiantes --</option>
        <option value="est-001">María García López</option>
        <option value="est-002">Juan Rodríguez Martinez</option>
        <option value="est-003">Sofia Hernández López</option>
      </select>
    </div>

    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Práctica</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Fecha</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Horas</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Modelo</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Instructor</th>
              <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Notas</th>
            </tr>
          </thead>
          <tbody id="tabla-detalle">
            <tr class="border-b border-gray-200 hover:bg-gray-50">
              <td colspan="6" class="px-6 py-8 text-center text-gray-500">Selecciona un estudiante para ver sus prácticas</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('pageLoaded', function(e) {
  if (e.detail.page !== 'registro-diario') return;

  // Tabs functionality
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const tabName = this.getAttribute('data-tab');

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-primary-900', 'border-secondary-400'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

      this.classList.add('active', 'text-primary-900', 'border-secondary-400');
      document.getElementById('tab-' + tabName).classList.remove('hidden');
    });
  });

  // Style active tab
  document.querySelector('.tab-btn.active').classList.add('text-primary-900', 'border-secondary-400');

  // Set today's date
  document.getElementById('fecha-practica').valueAsDate = new Date();

  // Load estudiantes
  let estudiantes = [];
  fetch('data/students.json')
    .then(r => r.json())
    .then(data => {
      estudiantes = data.estudiantes || [];

      // Populate the "Detalle por Estudiante" dropdown
      const filtroEstudiante = document.getElementById('filtro-estudiante');
      estudiantes.forEach(est => {
        const option = document.createElement('option');
        option.value = est.id;
        option.textContent = est.nombre;
        filtroEstudiante.appendChild(option);
      });

      // Check if a student was preselected from estudiantes.html
      const estudianteSeleccionado = sessionStorage.getItem('estudianteSeleccionado');
      if (estudianteSeleccionado) {
        try {
          const estudiante = JSON.parse(estudianteSeleccionado);

          // Switch to "Detalle por Estudiante" tab
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-primary-900', 'border-secondary-400'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

          const detalleTab = document.querySelector('[data-tab="detalle"]');
          detalleTab.classList.add('active', 'text-primary-900', 'border-secondary-400');
          document.getElementById('tab-detalle').classList.remove('hidden');

          // Set the student filter dropdown
          filtroEstudiante.value = estudiante.id;

          // Trigger the change event to load the student's practices
          filtroEstudiante.dispatchEvent(new Event('change'));

          // Clear the sessionStorage to avoid loading again on refresh
          sessionStorage.removeItem('estudianteSeleccionado');
        } catch (e) {
          console.error('Error parsing student data:', e);
        }
      }
    });

  // Estudiante search
  document.getElementById('estudiante-search').addEventListener('input', function() {
    const search = this.value.toLowerCase();
    const sugerencias = document.getElementById('estudiante-sugerencias');

    if (search.length < 1) {
      sugerencias.classList.add('hidden');
      return;
    }

    const matches = estudiantes.filter(e =>
      e.nombre.toLowerCase().includes(search) ||
      e.id.toLowerCase().includes(search)
    );

    if (matches.length === 0) {
      sugerencias.innerHTML = '<div class="p-3 text-gray-600 text-center">No se encontraron estudiantes</div>';
      sugerencias.classList.remove('hidden');
      return;
    }

    sugerencias.innerHTML = matches.map(e => `
      <div class="p-3 hover:bg-secondary-100 cursor-pointer border-b border-gray-200 last:border-b-0 transition-colors"
           onclick="selectEstudiante('${e.id}', '${e.nombre}', '${e.programa}')">
        <p class="font-semibold text-gray-900">${e.nombre}</p>
        <p class="text-xs text-gray-600">${e.id} • ${e.programa}</p>
      </div>
    `).join('');

    sugerencias.classList.remove('hidden');
  });

  // Click outside to close suggestions
  document.addEventListener('click', function(e) {
    if (e.target.id !== 'estudiante-search') {
      document.getElementById('estudiante-sugerencias').classList.add('hidden');
    }
  });

  // Form submit
  document.getElementById('registro-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const estudiante_id = document.getElementById('estudiante-id').value;
    if (!estudiante_id) {
      app.showToast('Selecciona un estudiante', 'error');
      return;
    }

    const tipo_practica = document.getElementById('tipo-practica').value;
    if (!tipo_practica) {
      app.showToast('Selecciona un tipo de práctica', 'error');
      return;
    }

    const horas = parseFloat(document.getElementById('horas').value);
    if (!horas || horas <= 0) {
      app.showToast('Las horas deben ser mayor a 0', 'error');
      return;
    }

    const tipo_modelo = document.getElementById('tipo-modelo').value;
    if (!tipo_modelo) {
      app.showToast('Selecciona un tipo de modelo', 'error');
      return;
    }

    let practicas = JSON.parse(localStorage.getItem('practicas') || '[]');
    const nueva = {
      id: 'PRC' + Date.now(),
      id_estudiante: estudiante_id,
      tipo_practica: tipo_practica,
      fecha: document.getElementById('fecha-practica').value,
      horas: horas,
      tipo_modelo: tipo_modelo,
      instructor: document.getElementById('instructor').value || 'Sin asignar',
      notas: document.getElementById('notas').value,
      autorizada: document.getElementById('autorizada').checked,
      fecha_registro: new Date().toISOString()
    };

    practicas.push(nueva);
    localStorage.setItem('practicas', JSON.stringify(practicas));

    app.showToast('✓ Práctica registrada exitosamente', 'success');
    this.reset();
    document.getElementById('fecha-practica').valueAsDate = new Date();
    document.getElementById('estudiante-seleccionado').classList.add('hidden');
  });

  // Detalle por estudiante - filtro
  document.getElementById('filtro-estudiante').addEventListener('change', function() {
    const estudianteId = this.value;
    const tabla = document.getElementById('tabla-detalle');
    let practicas = JSON.parse(localStorage.getItem('practicas') || '[]');

    if (estudianteId) {
      practicas = practicas.filter(p => p.id_estudiante === estudianteId);
    }

    if (practicas.length === 0) {
      tabla.innerHTML = '<tr class="border-b border-gray-200"><td colspan="6" class="px-6 py-8 text-center text-gray-500">No hay prácticas registradas</td></tr>';
      return;
    }

    tabla.innerHTML = practicas.map(p => `
      <tr class="border-b border-gray-200 hover:bg-gray-50">
        <td class="px-6 py-4 text-sm text-gray-700">${p.tipo_practica}</td>
        <td class="px-6 py-4 text-sm text-gray-700">${p.fecha}</td>
        <td class="px-6 py-4 text-sm text-gray-700">${p.horas} h</td>
        <td class="px-6 py-4 text-sm text-gray-700">${p.tipo_modelo}</td>
        <td class="px-6 py-4 text-sm text-gray-700">${p.instructor}</td>
        <td class="px-6 py-4 text-sm text-gray-700">${p.notas || '-'}</td>
      </tr>
    `).join('');
  });
});

function selectEstudiante(id, nombre, programa) {
  document.getElementById('estudiante-id').value = id;
  document.getElementById('estudiante-nombre').textContent = nombre;
  document.getElementById('estudiante-programa').textContent = programa;
  document.getElementById('estudiante-seleccionado').classList.remove('hidden');
  document.getElementById('estudiante-search').value = nombre;
  document.getElementById('estudiante-sugerencias').classList.add('hidden');
}
</script>

<style>
.tab-btn {
  border-bottom-width: 2px;
  border-bottom-color: transparent;
}

.tab-btn.active {
  border-bottom-color: #00BFA5;
  color: #2B5A9D;
}
</style>

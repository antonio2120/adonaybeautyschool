<div class="animate-fadeInUp">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
      <div>
        <button id="btn-volver" class="flex items-center gap-2 text-secondary-600 hover:text-secondary-800 font-semibold mb-4 transition-colors">
          ← Volver
        </button>
        <h1 class="font-serif text-4xl font-bold text-primary-900 mb-2" id="titulo-grupo">Grupo</h1>
        <div class="h-1 w-12 bg-secondary-400 my-3"></div>
      </div>
    </div>

    <!-- Datos del Grupo -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg shadow p-4">
        <p class="text-sm text-gray-600 font-semibold">ID Grupo</p>
        <p class="text-2xl font-bold text-primary-900" id="info-id">GRP-001</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <p class="text-sm text-gray-600 font-semibold">Programa</p>
        <p class="text-xl font-bold text-secondary-600" id="info-programa">Cosmetology</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <p class="text-sm text-gray-600 font-semibold">Fecha Inicio</p>
        <p class="text-xl font-bold text-gray-700" id="info-fecha">2026-01-15</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <p class="text-sm text-gray-600 font-semibold">Ocupación</p>
        <div class="mt-2">
          <p class="text-lg font-bold text-secondary-600" id="info-ocupacion">12/15</p>
          <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
            <div class="bg-secondary-500 h-2 rounded-full" id="barra-ocupacion" style="width: 80%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Controles -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Buscar Estudiante</label>
          <input type="text" id="search-estudiantes-grupo" placeholder="Buscar por nombre o ID..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400">
        </div>
        <div class="flex items-end gap-2">
          <button id="reset-grupo" class="flex-1 px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-semibold text-sm transition-all">
            Limpiar
          </button>
          <button id="btn-agregar-estudiante-grupo" class="flex-1 px-4 py-2 bg-secondary-500 hover:bg-secondary-600 text-white rounded-lg font-semibold text-sm transition-all">
            + Agregar Estudiante
          </button>
        </div>
      </div>

      <p class="text-sm text-gray-600">Total estudiantes en grupo: <span id="total-estudiantes-grupo">0</span></p>
    </div>

    <!-- Tabla de Estudiantes del Grupo -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-200 bg-gray-50">
              <th class="px-6 py-4 text-center font-semibold text-gray-700">Foto</th>
              <th class="px-6 py-4 text-left font-semibold text-gray-700">ID</th>
              <th class="px-6 py-4 text-left font-semibold text-gray-700">Nombre</th>
              <th class="px-6 py-4 text-left font-semibold text-gray-700">Programa</th>
              <th class="px-6 py-4 text-center font-semibold text-gray-700">Estado</th>
              <th class="px-6 py-4 text-center font-semibold text-gray-700">Acciones</th>
            </tr>
          </thead>
          <tbody id="grupo-estudiantes-tbody">
            <!-- Se llena dinámicamente -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal para Agregar Estudiante al Grupo -->
<div id="modal-agregar-estudiante-grupo" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
    <div class="p-6 border-b border-gray-200">
      <h2 class="text-2xl font-bold text-gray-800">Agregar Estudiante al Grupo</h2>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Seleccionar Estudiante *</label>
        <select id="form-estudiante-grupo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-secondary-400">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
    </div>
    <div class="p-6 border-t border-gray-200 flex gap-3">
      <button id="btn-confirmar-agregar-estudiante" class="flex-1 px-4 py-2 bg-secondary-500 hover:bg-secondary-600 text-white rounded-lg font-semibold transition-all">
        Agregar
      </button>
      <button id="btn-cancelar-agregar-estudiante" class="flex-1 px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-semibold transition-all">
        Cancelar
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  // Todos los estudiantes disponibles
  const todosEstudiantes = [
    { id: 'STU001', nombre: 'Noemi Romero', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 26.5, porcentaje: 2.2, estado: 'Activo' },
    { id: 'STU002', nombre: 'Maria Garcia', programa: 'Esthetician', horas_requeridas: 600, completadas: 11, porcentaje: 1.8, estado: 'Activo' },
    { id: 'STU003', nombre: 'Jessica Williams', programa: 'Nail Technician', horas_requeridas: 400, completadas: 8.5, porcentaje: 2.1, estado: 'Activo' },
    { id: 'STU004', nombre: 'Sofia Martinez', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 145, porcentaje: 12.1, estado: 'Activo' },
    { id: 'STU005', nombre: 'Isabella Rodríguez', programa: 'Esthetician', horas_requeridas: 600, completadas: 89, porcentaje: 14.8, estado: 'Activo' },
    { id: 'STU006', nombre: 'Daniela Torres', programa: 'Nail Technician', horas_requeridas: 400, completadas: 72, porcentaje: 18.0, estado: 'Activo' },
    { id: 'STU007', nombre: 'Catalina Herrera', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 234, porcentaje: 19.5, estado: 'Activo' },
    { id: 'STU008', nombre: 'Alejandra López', programa: 'Esthetician', horas_requeridas: 600, completadas: 156, porcentaje: 26.0, estado: 'Activo' },
    { id: 'STU009', nombre: 'Valentina Sánchez', programa: 'Nail Technician', horas_requeridas: 400, completadas: 95, porcentaje: 23.8, estado: 'Activo' },
    { id: 'STU010', nombre: 'Gabriela Flores', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 567, porcentaje: 47.3, estado: 'Activo' },
    { id: 'STU011', nombre: 'Mariana Gutiérrez', programa: 'Esthetician', horas_requeridas: 600, completadas: 312, porcentaje: 52.0, estado: 'Activo' },
    { id: 'STU012', nombre: 'Lucía Mendoza', programa: 'Nail Technician', horas_requeridas: 400, completadas: 234, porcentaje: 58.5, estado: 'Activo' },
    { id: 'STU013', nombre: 'Carmen Rivas', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 890, porcentaje: 74.2, estado: 'Activo' },
    { id: 'STU014', nombre: 'Rosario García', programa: 'Esthetician', horas_requeridas: 600, completadas: 450, porcentaje: 75.0, estado: 'Activo' },
    { id: 'STU015', nombre: 'Elena Castillo', programa: 'Nail Technician', horas_requeridas: 400, completadas: 325, porcentaje: 81.3, estado: 'Activo' },
    { id: 'STU016', nombre: 'Patricia Jiménez', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 1189, porcentaje: 99.1, estado: 'Activo' },
    { id: 'STU017', nombre: 'Adriana Vega', programa: 'Esthetician', horas_requeridas: 600, completadas: 598, porcentaje: 99.7, estado: 'Activo' },
    { id: 'STU018', nombre: 'Lorena Fuentes', programa: 'Nail Technician', horas_requeridas: 400, completadas: 400, porcentaje: 100.0, estado: 'Completado' },
    { id: 'STU019', nombre: 'Natalia Reyes', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 1200, porcentaje: 100.0, estado: 'Completado' },
    { id: 'STU020', nombre: 'Viviana Peña', programa: 'Esthetician', horas_requeridas: 600, completadas: 45, porcentaje: 7.5, estado: 'Activo' },
    { id: 'STU021', nombre: 'Miriam Silva', programa: 'Nail Technician', horas_requeridas: 400, completadas: 12, porcentaje: 3.0, estado: 'Activo' },
    { id: 'STU022', nombre: 'Fabiola Morales', programa: 'Cosmetology', horas_requeridas: 1200, completadas: 0, porcentaje: 0.0, estado: 'Inactivo' },
    { id: 'STU023', nombre: 'Yanira Cortés', programa: 'Esthetician', horas_requeridas: 600, completadas: 38, porcentaje: 6.3, estado: 'Activo' }
  ];

  let grupoData = null;
  let estudiantesEnGrupo = [];
  let estudiantesFiltrados = [];

  const btnVolver = document.getElementById('btn-volver');
  const searchInput = document.getElementById('search-estudiantes-grupo');
  const resetBtn = document.getElementById('reset-grupo');
  const btnAgregar = document.getElementById('btn-agregar-estudiante-grupo');
  const modal = document.getElementById('modal-agregar-estudiante-grupo');
  const btnConfirmar = document.getElementById('btn-confirmar-agregar-estudiante');
  const btnCancelar = document.getElementById('btn-cancelar-agregar-estudiante');
  const selectEstudiante = document.getElementById('form-estudiante-grupo');
  const tbody = document.getElementById('grupo-estudiantes-tbody');

  function cargarGrupo() {
    const grupoJson = sessionStorage.getItem('grupoSeleccionado');
    if (grupoJson) {
      grupoData = JSON.parse(grupoJson);
      document.getElementById('titulo-grupo').textContent = `Grupo ${grupoData.id}`;
      document.getElementById('info-id').textContent = grupoData.id;
      document.getElementById('info-programa').textContent = grupoData.programa;
      document.getElementById('info-fecha').textContent = grupoData.fecha;
      document.getElementById('info-ocupacion').textContent = `${grupoData.estudiantes}/${grupoData.capacidad}`;

      const porcentaje = Math.round((grupoData.estudiantes / grupoData.capacidad) * 100);
      document.getElementById('barra-ocupacion').style.width = porcentaje + '%';

      // Simular estudiantes del grupo - Tomar los primeros N estudiantes del programa
      const estudiantesDelPrograma = todosEstudiantes.filter(e => e.programa === grupoData.programa);
      estudiantesEnGrupo = estudiantesDelPrograma.slice(0, grupoData.estudiantes);

      filtrar();
      cargarSelectEstudiantes();
    }
  }

  function renderTable() {
    tbody.innerHTML = '';
    estudiantesFiltrados.forEach(est => {
      const estadoColor = est.estado === 'Completado' ? 'bg-blue-100 text-blue-800' :
                          est.estado === 'Activo' ? 'bg-green-100 text-green-800' :
                          'bg-yellow-100 text-yellow-800';

      const row = document.createElement('tr');
      row.className = 'border-b border-gray-200 hover:bg-gray-50';
      row.innerHTML = `
        <td class="px-6 py-4 text-center">
          <div class="w-10 h-10 bg-gradient-to-br from-secondary-300 to-secondary-500 rounded-full flex items-center justify-center text-white cursor-pointer hover:scale-110 transition-transform" title="Ver foto">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
        </td>
        <td class="px-6 py-4 font-mono text-gray-800">${est.id}</td>
        <td class="px-6 py-4 text-gray-800">${est.nombre}</td>
        <td class="px-6 py-4 text-gray-800">${est.programa}</td>
        <td class="px-6 py-4 text-center"><span class="px-3 py-1 ${estadoColor} rounded-full text-xs font-semibold">${est.estado}</span></td>
        <td class="px-6 py-4 text-center">
          <button class="btn-eliminar-estudiante px-3 py-1 bg-red-500 hover:bg-red-600 text-white rounded text-xs font-semibold transition-all" data-id="${est.id}">
            🗑️ Eliminar
          </button>
        </td>
      `;
      tbody.appendChild(row);
    });
    document.getElementById('total-estudiantes-grupo').textContent = estudiantesEnGrupo.length;
  }

  function filtrar() {
    const search = searchInput.value.toLowerCase();
    estudiantesFiltrados = estudiantesEnGrupo.filter(e => {
      return e.id.toLowerCase().includes(search) || e.nombre.toLowerCase().includes(search);
    });
    renderTable();
  }

  function cargarSelectEstudiantes() {
    // Estudiantes disponibles para agregar (no en el grupo)
    const estudiantes_disponibles = todosEstudiantes.filter(e =>
      !estudiantesEnGrupo.find(eg => eg.id === e.id) && e.programa === grupoData.programa
    );

    selectEstudiante.innerHTML = '<option value="">-- Seleccionar --</option>';
    estudiantes_disponibles.forEach(est => {
      const option = document.createElement('option');
      option.value = est.id;
      option.textContent = `${est.id} - ${est.nombre}`;
      selectEstudiante.appendChild(option);
    });
  }

  function openModal() {
    modal.classList.remove('hidden');
  }

  function closeModal() {
    modal.classList.add('hidden');
    selectEstudiante.value = '';
  }

  btnVolver.addEventListener('click', () => {
    sessionStorage.removeItem('grupoSeleccionado');
    app.loadPage('grupos');
  });

  searchInput.addEventListener('input', filtrar);

  resetBtn.addEventListener('click', () => {
    searchInput.value = '';
    filtrar();
  });

  btnAgregar.addEventListener('click', () => {
    if (estudiantesEnGrupo.length >= grupoData.capacidad) {
      alert('El grupo está lleno. No se pueden agregar más estudiantes.');
      return;
    }
    openModal();
  });

  btnCancelar.addEventListener('click', closeModal);

  btnConfirmar.addEventListener('click', () => {
    const estudianteId = selectEstudiante.value;
    if (!estudianteId) {
      alert('Selecciona un estudiante');
      return;
    }

    const estudiante = todosEstudiantes.find(e => e.id === estudianteId);
    if (estudiante) {
      estudiantesEnGrupo.push(estudiante);
      grupoData.estudiantes = estudiantesEnGrupo.length;
      cargarSelectEstudiantes();
      filtrar();
      app.showToast('✓ Estudiante agregado al grupo', 'success');
      closeModal();
    }
  });

  // Event delegation para botón eliminar
  tbody.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-eliminar-estudiante')) {
      const estudianteId = e.target.getAttribute('data-id');
      if (confirm('¿Eliminar este estudiante del grupo?')) {
        const index = estudiantesEnGrupo.findIndex(e => e.id === estudianteId);
        if (index > -1) {
          estudiantesEnGrupo.splice(index, 1);
          grupoData.estudiantes = estudiantesEnGrupo.length;
          cargarSelectEstudiantes();
          filtrar();
          app.showToast('✓ Estudiante eliminado del grupo', 'success');
        }
      }
    }
  });

  cargarGrupo();
})();
</script>

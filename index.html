  <!-- Custom Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --primary: #2B5A9D;
      --accent: #00BFA5;
      --dark: #0A1628;
      --dark-text: #0E1C2F;
      --light-bg: #FAFBFF;
      --muted: #5A6A80;
    }

    * {
      font-family: 'DM Sans', sans-serif;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
    }

    /* HERO STYLES FROM LANDING PAGE */
    .badge-mint {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      background: rgba(0, 191, 165, 0.15);
      border: 1px solid rgba(0, 191, 165, 0.35);
      border-radius: 9999px;
      padding: 0.375rem 1rem;
    }

    .badge-mint-text {
      color: var(--accent);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 191, 165, 0.3); }
      50% { box-shadow: 0 0 40px rgba(0, 191, 165, 0.6); }
    }

    @keyframes heroFloat {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @keyframes iconBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .animate-glow-pulse {
      animation: glowPulse 3s ease-in-out infinite;
    }

    .animate-hero-float {
      animation: heroFloat 6s ease-in-out infinite;
    }

    .icon-bounce:hover {
      animation: iconBounce 0.6s ease-in-out;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      padding: 1rem 2.25rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(0, 191, 165, 0.25);
      display: inline-block;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary:hover {
      background-color: #00A896;
      transform: scale(1.03);
    }

    /* Dashboard Welcome Section with Background Image */
    .dashboard-welcome {
      position: relative;
      overflow: hidden;
    }

    .dashboard-welcome::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, var(--dark) 0%, var(--dark) 50%, rgba(10, 22, 40, 0.3) 85%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    .dashboard-welcome::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, var(--dark) 95%);
      pointer-events: none;
      z-index: 1;
    }

    .dashboard-welcome > div {
      position: relative;
      z-index: 2;
    }

    /* Sidebar Toggle Styles */
    aside.sidebar-collapsed {
      width: 0;
      overflow: hidden;
      padding: 0;
    }

    @media (min-width: 768px) {
      aside.sidebar-collapsed {
        transform: translateX(-100%);
      }

      main {
        transition: margin-left 0.3s ease;
      }

      main.sidebar-collapsed {
        margin-left: 0;
      }
    }

    @import url('css/input.css');
  </style>

  <!-- Update current time and date -->
  <script>
    function updateDateTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      const timeEl = document.getElementById('current-time');
      const dateEl = document.getElementById('current-date');
      if (timeEl) timeEl.textContent = timeStr;
      if (dateEl) dateEl.textContent = dateStr;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>

<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="none"/>

  <!-- Defs: Gradients -->
  <defs>
    <linearGradient id="blueToMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B7FD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC3E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BFA5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Triangle (Blue gradient to Mint) -->
  <path d="M 70 100 Q 120 60 140 220 L 100 280 Z" fill="url(#blueToMint)"/>

  <!-- Right Triangle (Mint) -->
  <path d="M 180 100 L 240 280 Q 270 220 310 120 Z" fill="url(#mintGrad)"/>

  <!-- Woman Profile Silhouette - BLACK -->
  <g id="woman-profile">
    <!-- Hair back -->
    <path d="M 140 100 Q 160 85 175 100 Q 180 90 185 110 Q 175 95 160 105 Z" fill="black"/>

    <!-- Head -->
    <ellipse cx="165" cy="130" rx="22" ry="28" fill="black"/>

    <!-- Face Profile (looking right) -->
    <path d="M 180 115 Q 200 120 205 140 Q 202 160 190 165 Q 175 160 172 140 Q 175 125 180 115 Z" fill="black"/>

    <!-- Eye -->
    <circle cx="195" cy="130" r="3" fill="black"/>

    <!-- Nose -->
    <path d="M 200 130 Q 205 135 203 143" stroke="black" stroke-width="2" fill="none"/>

    <!-- Mouth/Lips -->
    <path d="M 192 150 Q 200 153 205 150" stroke="black" stroke-width="2" fill="none"/>

    <!-- Chin -->
    <path d="M 190 165 Q 195 170 200 168" stroke="black" stroke-width="1.5" fill="none"/>

    <!-- Neck -->
    <rect x="180" y="160" width="12" height="25" fill="black"/>

    <!-- Hair strand left -->
    <path d="M 155 135 Q 150 150 152 170" stroke="black" stroke-width="3" fill="none"/>
  </g>

  <!-- Mint accent oval below face -->
  <ellipse cx="195" cy="210" rx="28" ry="18" fill="#00BFA5" opacity="0.8"/>

  <!-- Text: Adonay (Gray) -->
  <text x="200" y="310" font-family="Georgia, serif" font-size="56" font-weight="300" text-anchor="middle" fill="#808080" letter-spacing="3" font-style="italic">
    Adonay
  </text>

  <!-- Text: Beauty School (Blue) -->
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="32" font-weight="300" text-anchor="middle" fill="#2B5A9D" letter-spacing="1">
    Beauty School
  </text>
</svg>
